---
files:
  # Format:
  # - generator_type: Generator type
  #   filepath: Path to file to parse
  #   destination_dir: Path to directory to contain generated files
  #   class_name: Class to parse
  #   policies: Generator-specific policy mapping
  # 
  # Example:
  # - generator_type: any_value
  #   filepath: common/FingerprintStore.cpp
  #   destination_dir: common
  #   class_name: FingerprintStore
  #   policies: {}
  - generator_type: any_ptr
    filepath: dcgmlib/src/DcgmVgpuOps.cpp
    destination_dir: dcgmlib/src
    class_name: FbcSessionOps
    policies: {}
  - generator_type: any_ptr
    filepath: dcgmlib/src/DcgmVgpuOps.cpp
    destination_dir: dcgmlib/src
    class_name: VgpuFieldValueOps
    policies: {}
