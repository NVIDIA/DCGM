name: mndiag

networks:
  dcgm-net:
    driver: bridge

x-node: &node
  image: mndiag:latest
  build:
    context: .
    dockerfile: Dockerfile
    args:
      BASE_IMAGE: ${BASE_IMAGE:-ubuntu:24.04}
  networks:
    - dcgm-net
  cap_add:
    - SYSLOG
  volumes:
    - ${DCGM_INSTALL_DIR}/nv-hostengine:/usr/bin/nv-hostengine
    - ${DCGM_INSTALL_DIR}/dcgmi:/usr/bin/dcgmi
    - ${DCGM_INSTALL_DIR}/:/opt/dcgm/lib/
    - ../:/workspace/testing/
    # File generated dynamically at runtime by run_tests.sh based on -n NUM_WORKERS
    - ./dcgm_mndiag_test_config.json:/workspace/testing/dcgm_mndiag_test_config.json
  environment:
    # Paths and permissions for mndiag's MPI-based test execution
    - DCGM_MNDIAG_MPIRUN_PATH=/usr/bin/mpirun
    - DCGM_MNDIAG_MNUBERGEMM_PATH=/tmp/mock_mnubergemm
    - DCGM_MNDIAG_SUPPORTED_SKUS=2941
    - DCGM_MPIRUN_ALLOW_RUN_AS_ROOT=1

services:
  head-node:
    <<: *node
    hostname: head-node
    container_name: head-node

  worker:
    <<: *node
    # container_name and hostname intentionally omitted to allow --scale
